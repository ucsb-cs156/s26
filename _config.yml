# remote_theme: just-the-docs/just-the-docs
theme: just-the-docs

incremental: true

jdk_distribution: "21.0.6-librca"

exclude: 
  - lab_SAVE
  - lectures_SAVE
  - hwk_SAVE

course: "CMPSC 156"
title: "CS156 s26"
quarter: "Fall 2025"
QXX: s26
qxx: s26
baseurl: "/s26"
slack_help_lecture_discussion: TBD
sample_team: s26-04

ta_list_full: Sanjay Chandrasekaran, Kate Larrick
la_list_full: Daniel Jensen, Derek Kirschbaum, Samuel Zhu, Divyani Punj
discussion_section_day: Wednesday
discussion_section_times: 4pm, 6pm

help_windows_link: https://ucsb-cs156-s26.slack.com/archives/C09A5LE7T89
help_macos_link: https://ucsb-cs156-s26.slack.com/archives/C09A5LGBP25
help_lecture_discussion: https://ucsb-cs156-s26.slack.com/archives/C099W8E5W5S

mermaid:
  # Version of mermaid library
  # Pick an available version from https://cdn.jsdelivr.net/npm/mermaid/
  version: "9.1.3"

# Aux links for the upper right navigation
aux_links:
  "CS156 main website":
    - "https://ucsb-cs156.github.io/"
  "github":
    - "//github.com/ucsb-cs156-s26"
  "Canvas":
    - "https://ucsb.instructure.com/courses/27687"

# TODO: replace canvas link above with specific one
# such as https://www.canvas.ucsb.edu/courses/12345

# Footer last edited timestamp
last_edit_timestamp: true # show or hide edit time - page must have `last_modified_date` defined in the frontmatter
last_edit_time_format: "%b %e %Y at %I:%M %p" # uses ruby's time format: https://ruby-doc.org/stdlib-2.7.0/libdoc/time/rdoc/Time.html

# Footer "Edit this page on GitHub" link text
gh_edit_link: true # show or hide edit this page link
gh_edit_link_text: "Edit this page on GitHub."
gh_edit_repository: "https://github.com/ucsb-cs156/s26" # the github URL for your repo
gh_edit_branch: "main" # the branch that your docs is served from
gh_edit_view_mode: "edit" # "tree" or "edit" if you want the user to jump into the editor immediately


# Collections for website data
collections:
  modules:
  staffers:
    permalink: "/:path/"
    output: true
  lectures:
    permalink: "/lectures/:path/"
    output: true
  hwk:
    permalink: "/hwk/:path/"
    output: true
# Default layouts for each collection type
defaults:
  - scope:
      type: lectures
    values:
      layout: default
  - scope:
      type: hwk
    values:
      layout: default
  - scope:
      path: ""
      type: staffers
    values:
      layout: staffer
      subpath: "/assets/images/"

